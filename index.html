<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="theme-color" content="#0a1f44" />
<title>TNB Vendor Day — Send Energy</title>
<style>
  :root{
    --tnb-blue:#0033a0;
    --tnb-blue-d:#001a5c;
    --tnb-red:#e2231a;
    --gold:#ffd54a;
    --bg1:#eaf1ff;
    --bg2:#ffffff;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;overflow:hidden;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:radial-gradient(circle at 50% 30%,var(--bg2),var(--bg1));
    color:var(--tnb-blue-d);
    display:flex;align-items:center;justify-content:center;
    height:100dvh;user-select:none;-webkit-user-select:none;touch-action:manipulation;
  }
  #app{width:100%;max-width:520px;height:100dvh;display:flex;flex-direction:column;
       align-items:center;justify-content:space-between;padding:26px 20px;position:relative;}

  /* Header */
  .head{width:100%;text-align:center;}
  .kicker{font-size:13px;letter-spacing:3px;font-weight:700;color:var(--tnb-red);text-transform:uppercase;}
  .head h1{margin:6px 0 0;font-size:24px;font-weight:800;letter-spacing:1px;color:var(--tnb-blue);}
  .brandLogo{width:130px;height:auto;max-width:55vw;object-fit:contain;display:block;margin:0 auto;
             filter:drop-shadow(0 4px 10px rgba(0,51,160,.18));}

  /* Timer */
  .timerWrap{display:flex;flex-direction:column;align-items:center;gap:2px;}
  .timer{font-size:58px;font-weight:800;line-height:1;font-variant-numeric:tabular-nums;color:var(--tnb-blue);transition:color .2s;}
  .timer.warn{color:var(--tnb-red);animation:pulseWarn .5s infinite;}
  @keyframes pulseWarn{50%{transform:scale(1.08);}}
  .timerLabel{font-size:12px;letter-spacing:2px;color:#6b7aa0;text-transform:uppercase;font-weight:700;}

  /* Energy readout */
  .energy{font-size:15px;font-weight:700;color:var(--tnb-blue-d);}
  .energy b{color:var(--tnb-red);font-size:20px;}
  .bar{width:78%;max-width:340px;height:10px;border-radius:20px;background:#d7e0f5;overflow:hidden;margin-top:8px;box-shadow:inset 0 1px 3px rgba(0,0,0,.15);}
  .bar > i{display:block;height:100%;width:0;border-radius:20px;background:linear-gradient(90deg,var(--tnb-blue),var(--gold));transition:width .12s;}

  /* Logo tap zone */
  .stage{flex:1;display:flex;align-items:center;justify-content:center;width:100%;position:relative;}
  #tap{
    position:relative;width:min(74vw,300px);height:min(74vw,300px);border-radius:50%;
    border:none;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;
    outline:none;transition:transform .06s;
  }
  #tap:active{transform:scale(.93);}
  .halo{position:absolute;inset:-6%;border-radius:50%;
    background:radial-gradient(circle,rgba(0,51,160,.18),rgba(0,51,160,0) 70%);
    animation:breathe 2.2s ease-in-out infinite;}
  @keyframes breathe{50%{transform:scale(1.08);opacity:.75;}}
  .ring{position:absolute;inset:0;border-radius:50%;border:3px solid rgba(0,51,160,.25);}
  .logoFallback{font-size:min(40vw,168px);line-height:1;pointer-events:none;
     filter:drop-shadow(0 0 18px rgba(255,213,74,.8)) drop-shadow(0 6px 16px rgba(226,35,26,.45));
     animation:zapGlow 2.2s ease-in-out infinite;}
  @keyframes zapGlow{50%{filter:drop-shadow(0 0 30px rgba(255,213,74,1)) drop-shadow(0 6px 16px rgba(226,35,26,.55));}}

  .zap{position:absolute;pointer-events:none;font-weight:800;color:var(--tnb-red);font-size:26px;
       animation:fly .7s ease-out forwards;text-shadow:0 2px 6px rgba(0,0,0,.15);}
  @keyframes fly{0%{opacity:1;transform:translate(-50%,-50%) scale(.6);}100%{opacity:0;transform:translate(-50%,-160%) scale(1.3);}}

  .spark{position:absolute;width:8px;height:8px;border-radius:50%;background:var(--gold);pointer-events:none;
         box-shadow:0 0 8px 2px var(--gold);animation:spark .5s ease-out forwards;}
  @keyframes spark{to{opacity:0;transform:translate(var(--dx),var(--dy)) scale(.2);}}

  /* Instruction / footer */
  .instruct{text-align:center;font-size:17px;font-weight:700;color:var(--tnb-blue-d);min-height:24px;}
  .instruct span{color:var(--tnb-red);}
  .foot{font-size:11px;letter-spacing:2px;color:#9aa7c7;text-transform:uppercase;}

  /* Overlay (start + thank you) */
  .overlay{position:absolute;inset:0;background:linear-gradient(160deg,var(--tnb-blue),var(--tnb-blue-d));
    color:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;
    text-align:center;padding:32px;z-index:10;transition:opacity .35s;}
  .overlay.hidden{opacity:0;pointer-events:none;}
  .overlay h2{margin:0;font-size:34px;font-weight:800;letter-spacing:1px;}
  .overlay p{margin:0;font-size:17px;opacity:.92;max-width:300px;line-height:1.5;}
  .bigNum{font-size:72px;font-weight:800;color:var(--gold);line-height:1;margin:4px 0;text-shadow:0 4px 18px rgba(0,0,0,.3);}
  .btn{margin-top:6px;background:var(--tnb-red);color:#fff;border:none;border-radius:40px;
       padding:15px 40px;font-size:17px;font-weight:800;letter-spacing:1px;cursor:pointer;
       box-shadow:0 8px 20px rgba(226,35,26,.4);transition:transform .08s;}
  .btn:active{transform:scale(.95);}
  .ovLogo{width:150px;height:150px;object-fit:contain;margin-bottom:2px;filter:drop-shadow(0 8px 20px rgba(0,0,0,.35));}
  .ovLogoFallback{font-size:96px;}
</style>
</head>
<body>
<div id="app">
  <div class="head">
    <img class="brandLogo" src="logo2.png" alt="TNB Vendor Day" />
    <h1>⚡ Send Energy ⚡</h1>
  </div>

  <div class="timerWrap">
    <div class="timer" id="timer">20</div>
    <div class="timerLabel">seconds left</div>
  </div>

  <div style="display:flex;flex-direction:column;align-items:center;width:100%;">
    <div class="energy">Energy sent: <b id="count">0</b></div>
    <div class="bar"><i id="barFill"></i></div>
  </div>

  <div class="stage">
    <button id="tap" aria-label="Tap to send energy">
      <div class="halo"></div>
      <div class="ring"></div>
      <div class="logoFallback">⚡</div>
    </button>
  </div>

  <div class="instruct" id="instruct">Tap the logo to <span>send energy!</span></div>

  <!-- Start / Thank-you overlay -->
  <div class="overlay" id="overlay">
    <img class="ovLogo" src="logo.png" alt="TNB Vendor Day" onerror="this.style.display='none';document.getElementById('ovLogoFb').style.display='block';" />
    <div id="ovLogoFb" class="ovLogoFallback" style="display:none;">⚡</div>
    <h2 id="ovTitle">Ready?</h2>
    <p id="ovText">Tap the logo as many times as you can in 20 seconds to send energy!</p>
    <div class="bigNum" id="ovNum" style="display:none;">0</div>
    <button class="btn" id="startBtn">START</button>
  </div>
</div>

<script>
(function(){
  var DURATION = 20;
  var state = "idle"; // idle | running | done
  var timeLeft = DURATION;
  var count = 0;
  var tickInt = null;

  var el = {
    timer: document.getElementById("timer"),
    count: document.getElementById("count"),
    bar: document.getElementById("barFill"),
    tap: document.getElementById("tap"),
    stage: document.querySelector(".stage"),
    instruct: document.getElementById("instruct"),
    overlay: document.getElementById("overlay"),
    ovTitle: document.getElementById("ovTitle"),
    ovText: document.getElementById("ovText"),
    ovNum: document.getElementById("ovNum"),
    startBtn: document.getElementById("startBtn")
  };

  function fmt(n){ return n < 10 ? "0"+n : ""+n; }

  function resetView(){
    timeLeft = DURATION; count = 0; state = "idle";
    el.timer.textContent = fmt(DURATION);
    el.timer.classList.remove("warn");
    el.count.textContent = "0";
    el.bar.style.width = "0%";
    el.instruct.innerHTML = 'Tap the logo to <span>send energy!</span>';
  }

  function showStart(){
    resetView();
    el.ovTitle.textContent = "Ready?";
    el.ovText.style.display = "block";
    el.ovText.textContent = "Tap the logo as many times as you can in 20 seconds to send energy!";
    el.ovNum.style.display = "none";
    el.startBtn.textContent = "START";
    el.startBtn.style.display = "";
    el.overlay.classList.remove("hidden");
  }

  function startGame(){
    resetView();
    state = "running";
    el.overlay.classList.add("hidden");
    if (tickInt) clearInterval(tickInt);
    tickInt = setInterval(tick, 1000);
  }

  function tick(){
    timeLeft--;
    el.timer.textContent = fmt(Math.max(0,timeLeft));
    if (timeLeft <= 5) el.timer.classList.add("warn");
    if (timeLeft <= 0){ endGame(); }
  }

  function endGame(){
    state = "done";
    if (tickInt) clearInterval(tickInt);
    el.timer.textContent = "00";
    el.ovTitle.textContent = "Thank You!";
    el.ovText.style.display = "block";
    el.ovText.textContent = "You sent this much energy to TNB Vendor Day:";
    el.ovNum.style.display = "block";
    el.ovNum.textContent = count;
    el.startBtn.style.display = "none";
    el.overlay.classList.remove("hidden");
  }

  function burst(x,y){
    // flying "+1"
    var z = document.createElement("div");
    z.className = "zap"; z.textContent = "+1";
    z.style.left = x+"px"; z.style.top = y+"px";
    el.stage.appendChild(z);
    setTimeout(function(){ z.remove(); }, 700);
    // sparks
    for (var i=0;i<6;i++){
      var s = document.createElement("div");
      s.className = "spark";
      var ang = Math.random()*Math.PI*2, dist = 40+Math.random()*50;
      s.style.left = x+"px"; s.style.top = y+"px";
      s.style.setProperty("--dx",(Math.cos(ang)*dist)+"px");
      s.style.setProperty("--dy",(Math.sin(ang)*dist)+"px");
      el.stage.appendChild(s);
      (function(sp){ setTimeout(function(){ sp.remove(); },500); })(s);
    }
  }

  function doTap(ev){
    if (state !== "running") return;
    ev.preventDefault();
    count++;
    el.count.textContent = count;
    var pct = Math.min(100, count); // visual fill, caps at 100
    el.bar.style.width = pct + "%";
    if (navigator.vibrate) { try{ navigator.vibrate(15); }catch(e){} }
    var rect = el.stage.getBoundingClientRect();
    var px, py;
    if (ev.touches && ev.touches[0]){ px = ev.touches[0].clientX - rect.left; py = ev.touches[0].clientY - rect.top; }
    else if (ev.clientX != null){ px = ev.clientX - rect.left; py = ev.clientY - rect.top; }
    else { px = rect.width/2; py = rect.height/2; }
    burst(px, py);
  }

  // pointer/touch handling (avoid double count)
  var usePointer = window.PointerEvent;
  if (usePointer){
    el.tap.addEventListener("pointerdown", doTap);
  } else {
    el.tap.addEventListener("touchstart", doTap, {passive:false});
    el.tap.addEventListener("mousedown", doTap);
  }

  el.startBtn.addEventListener("click", startGame);

  showStart();
})();
</script>
</body>
</html>
